<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorecard Pro</title>
    <!-- iOS PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scorecard">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-green: #10b981;
            --accent-blue: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 10px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 700;
        }

        .total-badge {
            background-color: var(--card-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid #334155;
            font-size: 14px;
        }

        /* Hole Navigation */
        .hole-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        .nav-btn:active { background: #475569; }
        .hole-num { font-size: 20px; font-weight: 800; color: var(--accent-green); }

        /* Yardage & Par Card */
        .course-details-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        .yardage-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .yardage-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .yardage-input {
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 8px;
            border-radius: 8px;
            width: 90px;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            -webkit-appearance: none;
        }

        .par-display-wrapper {
            text-align: right;
        }

        .par-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-blue);
        }

        /* Hole Strokes Summary Banner */
        .stats-bar {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .stat-lbl { font-size: 11px; text-transform: uppercase; color: var(--text-muted); }

        /* Club Selection Bag */
        .pool-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .club-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .club-card {
            background: #334155;
            color: white;
            padding: 12px 4px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }

        .club-card:active {
            transform: scale(0.95);
            background: #475569;
        }

        /* Current Hole Flow Track */
        .current-flow-container {
            background: #1e293b80;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .stroke-chips-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .stroke-chip {
            background: var(--accent-blue);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stroke-chip .remove-x {
            color: #ef4444;
            font-weight: 800;
            margin-left: 4px;
            padding: 0 2px;
        }

        /* Running Summary (Bottom of App) */
        .history-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            margin-top: 10px;
            border-top: 3px solid var(--accent-green);
        }

        .history-scroll {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .history-row {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-row-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .history-row-details {
            font-size: 11px;
            color: var(--text-muted);
        }

        .history-clubs-string {
            font-size: 12px;
            color: var(--text-main);
            font-style: italic;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Scorecard Pro</h1>
        <div class="total-badge">Round Total: <span id="total-score">0</span></div>
    </header>

    <!-- Hole Navigator -->
    <div class="hole-selector">
        <button class="nav-btn" onclick="changeHole(-1)">−</button>
        <div class="hole-num" id="hole-title">Hole 1</div>
        <button class="nav-btn" onclick="changeHole(1)">+</button>
    </div>

    <!-- Yardage & Calculated Par Tracker -->
    <div class="course-details-card">
        <div class="yardage-input-wrapper">
            <label class="yardage-label" for="yardage-field">Hole Yards</label>
            <input type="number" id="yardage-field" class="yardage-input" placeholder="Yards" oninput="handleYardageInput(this.value)" pattern="[0-9]*" inputmode="numeric">
        </div>
        <div class="par-display-wrapper">
            <div class="yardage-label">Calculated Par</div>
            <div class="par-value" id="par-display">Par --</div>
        </div>
    </div>

    <!-- Quick Stats Breakdown -->
    <div class="stats-bar">
        <div class="stat-val" id="current-strokes">0</div>
        <div class="stat-lbl">Hole Strokes Added</div>
    </div>

    <!-- Club Selection Bag Grid -->
    <div class="pool-container">
        <div class="section-title">Tap Club to Register Shot</div>
        <div class="club-grid">
            <div class="club-card" onclick="addStroke('Driver')">Driver</div>
            <div class="club-card" onclick="addStroke('2 Wood')">2 Wood</div>
            <div class="club-card" onclick="addStroke('4 Iron')">4 Iron</div>
            <div class="club-card" onclick="addStroke('5 Iron')">5 Iron</div>
            <div class="club-card" onclick="addStroke('5 Hybrid')">5 Hyb</div>
            <div class="club-card" onclick="addStroke('6 Iron')">6 Iron</div>
            <div class="club-card" onclick="addStroke('7 Iron')">7 Iron</div>
            <div class="club-card" onclick="addStroke('8 Iron')">8 Iron</div>
            <div class="club-card" onclick="addStroke('9 Iron')">9 Iron</div>
            <div class="club-card" onclick="addStroke('Pitching Wedge')">PW</div>
            <div class="club-card" onclick="addStroke('Sand Wedge')">SW</div>
            <div class="club-card" onclick="addStroke('Putter')">Putter</div>
        </div>
    </div>

    <!-- Current Hole Sequence Tracking -->
    <div class="current-flow-container">
        <div class="section-title">Active Hole Sequence (Tap to delete)</div>
        <div class="stroke-chips-flex" id="stroke-chips-flex">
            <!-- Dynamic Active Chips Insertion -->
        </div>
    </div>

    <!-- Full Running Round Summary (Bottom Drawer Layout) -->
    <div class="history-container">
        <div class="section-title">Running Round Summary (All Holes)</div>
        <div class="history-scroll" id="history-scroll">
            <!-- Dynamic Round Summary Rows Insertion -->
        </div>
    </div>
</div>

<script>
    let currentHole = 1;
    
    // Core Game Data Object
    const roundData = {};
    for (let i = 1; i <= 18; i++) {
        roundData[i] = {
            yards: "",
            par: "--",
            strokes: []
        };
    }

    function calculatePar(yards) {
        if (yards === "" || isNaN(yards)) return "--";
        const y = parseInt(yards);
        if (y >= 0 && y <= 250) return "3";
        if (y >= 251 && y <= 470) return "4";
        if (y >= 471 && y <= 690) return "5";
        return "5+"; // Edge case fallback
    }

    function handleYardageInput(val) {
        roundData[currentHole].yards = val;
        roundData[currentHole].par = calculatePar(val);
        document.getElementById('par-display').innerText = `Par ${roundData[currentHole].par}`;
        updateUI();
    }

    function addStroke(clubName) {
        roundData[currentHole].strokes.push(clubName);
        updateUI();
    }

    function removeStroke(index) {
        roundData[currentHole].strokes.splice(index, 1);
        updateUI();
    }

    function changeHole(direction) {
        let target = currentHole + direction;
        if (target >= 1 && target <= 18) {
            currentHole = target;
            updateUI();
        }
    }

    function updateUI() {
        // Update Primary Title Headers
        document.getElementById('hole-title').innerText = `Hole ${currentHole}`;
        
        // Sync Inputs & Par Values for Selected Hole
        const currentData = roundData[currentHole];
        document.getElementById('yardage-field').value = currentData.yards;
        document.getElementById('par-display').innerText = currentData.par !== "--" ? `Par ${currentData.par}` : "Par --";
        document.getElementById('current-strokes').innerText = currentData.strokes.length;

        // Render Current Hole Sequence Area
        const activeChipsContainer = document.getElementById('stroke-chips-flex');
        activeChipsContainer.innerHTML = '';

        if (currentData.strokes.length === 0) {
            activeChipsContainer.innerHTML = '<span style="color: var(--text-muted); font-size: 12px;">No hits tracked yet.</span>';
        } else {
            currentData.strokes.forEach((club, index) => {
                const chip = document.createElement('div');
                chip.className = 'stroke-chip';
                chip.onclick = () => removeStroke(index);
                chip.innerHTML = `${index + 1}: ${club} <span class="remove-x">×</span>`;
                activeChipsContainer.appendChild(chip);
            });
        }

        // Render Global Bottom Round Summary
        const summaryScrollContainer = document.getElementById('history-scroll');
        summaryScrollContainer.innerHTML = '';

        let totalScoreCount = 0;

        for (let i = 1; i <= 18; i++) {
            const hData = roundData[i];
            totalScoreCount += hData.strokes.length;

            // Only generate rows for holes that have registered interactions to keep dashboard clean
            if (hData.yards !== "" || hData.strokes.length > 0) {
                const summaryRow = document.createElement('div');
                summaryRow.className = 'history-row';
                
                const ydsDisplay = hData.yards ? `${hData.yards} yds` : 'Unset distance';
                const parDisplay = hData.par !== '--' ? `Par ${hData.par}` : 'Par uncalculated';
                const clubsText = hData.strokes.length > 0 ? hData.strokes.join(" ➔ ") : "No shots logged";

                summaryRow.innerHTML = `
                    <div class="history-row-header">
                        <div>Hole ${i}</div>
                        <div>Strokes: ${hData.strokes.length}</div>
                    </div>
                    <div class="history-row-details">${ydsDisplay} | ${parDisplay}</div>
                    <div class="history-clubs-string">${clubsText}</div>
                `;
                summaryScrollContainer.appendChild(summaryRow);
            }
        }

        // Handle Empty Running Summary Default Display 
        if(summaryScrollContainer.children.length === 0) {
            summaryScrollContainer.innerHTML = '<div style="color:var(--text-muted); text-align:center; font-size:12px; padding:20px 0;">Your running round card details will stream here as you progress.</div>';
        }

        // Update Global Grand Total Badge
        document.getElementById('total-score').innerText = totalScoreCount;
    }

    // Initialize layout
    updateUI();
</script>

</body>
</html>
